[build]
builder = "DOCKERFILE"
# Ruta relativa al Root Directory configurado en Railway ("backend/")
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Variables de entorno requeridas en Railway (configurar en el panel) ────────
# NODE_ENV             = "production"
# PORT                 = "4000"
# SUPABASE_URL         = "https://pxjxktpdxnqiulfyskuk.supabase.co"
# SUPABASE_SERVICE_ROLE_KEY = <desde Supabase dashboard>
# CORS_ORIGIN          = "https://finempoder.com.mx,https://www.finempoder.com.mx"
